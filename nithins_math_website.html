<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nithin's Math</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f6f9; }
    h1 { color: #2c3e50; font-size: 36px; }

    .tabs button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      cursor: pointer;
      background: #3498db;
      color: white;
      border-radius: 5px;
    }
    .tabs button:hover { background: #2980b9; }

    .tab-content { display: none; margin-top: 20px; }
    .active { display: block; }

    .question { font-size: 28px; margin: 10px; }

    .image-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px; /* SPACE BETWEEN GROUPS */
      margin: 15px 0;
    }

    .group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .images img { width: 50px; margin: 5px; }

    .symbol { font-size: 30px; font-weight: bold; }

    input { padding: 8px; font-size: 16px; }

    button.submit {
      margin-top: 10px;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .result {
      font-size: 24px;
      margin-left: 10px;
      display: inline-block;
    }

    .correct { color: green; }
    .wrong { color: red; }

  </style>
</head>
<body>

<h1>👦 Nithin's Math 👦</h1>

<div class="tabs">
  <button onclick="showTab('easy')">Easy</button>
  <button onclick="showTab('medium')">Medium</button>
  <button onclick="showTab('hard')">Hard</button>
</div>

<div id="easy" class="tab-content active"></div>
<div id="medium" class="tab-content"></div>
<div id="hard" class="tab-content"></div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

function generateQuestions(level, containerId) {
  let container = document.getElementById(containerId);
  container.innerHTML = '';

  for (let i = 0; i < 10; i++) {
    let a, b;

    if (level === 'easy') {
      a = Math.floor(Math.random() * 5) + 1;
      b = Math.floor(Math.random() * 5) + 1;
    } else if (level === 'medium') {
      a = Math.floor(Math.random() * 10) + 1;
      b = Math.floor(Math.random() * 10) + 1;
    } else {
      a = Math.floor(Math.random() * 20) + 1;
      b = Math.floor(Math.random() * 20) + 1;
    }

    let div = document.createElement('div');

    div.innerHTML = `
      <div class="question">${a} + ${b} = ?</div>

      <div class="image-row">
        <div class="group">
          <div>${a}</div>
          <div class="images">
            ${'<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">'.repeat(a)}
          </div>
        </div>

        <div class="symbol">+</div>

        <div class="group">
          <div>${b}</div>
          <div class="images">
            ${'<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">'.repeat(b)}
          </div>
        </div>
      </div>

      <input type="number" id="ans${level}${i}" placeholder="Your answer">
      <button class="submit" onclick="checkAnswer(${a+b}, 'ans${level}${i}', 'res${level}${i}')">Check</button>
      <span id="res${level}${i}" class="result"></span>
      <hr>
    `;

    container.appendChild(div);
  }
}

function checkAnswer(correct, inputId, resultId) {
  let val = document.getElementById(inputId).value;
  let result = document.getElementById(resultId);

  if (parseInt(val) === correct) {
    result.innerHTML = '✔️';
    result.className = 'result correct';
  } else {
    result.innerHTML = 'Try Again ❌';
    result.className = 'result wrong';
  }
}

// Load questions
generateQuestions('easy', 'easy');
generateQuestions('medium', 'medium');
generateQuestions('hard', 'hard');
</script>

</body>
</html>
